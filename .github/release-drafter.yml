name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
target-branch: master
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
      - 'bugfix'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'
      - 'documentation'
change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES

  ---
  <!-- Release Instructions:
  1. Run the manual 'Bump version' GitHub workflow on the `master` branch.
  2. Review and merge the resulting version bump pull request.
  3. Publish this draft release on GitHub. The 'Release Gem' workflow will automatically build and publish the gem to RubyGems.
  -->
