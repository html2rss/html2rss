# frozen_string_literal: true
parameters:
  query:
    type: string
    default: ruby
  locale:
    type: string
    default: en

headers:
  X-Query: "%<query>s"

channel:
  url: "https://example.com/search?q=%<query>s&locale=%<locale>s"

selectors:
  items:
    selector: ".item"
  title:
    selector: "h2"
